version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: zhi-mo-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: zhi_mo
    ports:
      - "13306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: zhi-mo-redis
    ports:
      - "16379:6379"

volumes:
  mysql-data:
