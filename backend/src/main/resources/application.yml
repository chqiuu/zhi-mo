server:
  port: 10000
  servlet:
    context-path: /zhi-mo/api

spring:
  application:
    name: zhi-mo-backend
  
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/zhi_mo?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123456
  
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.chqiuu.zhi-mo.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: zhi-mo-secret-key-change-in-production
  expiration: 86400000

# AI API 配置 (Kimi/文心/通义)
ai:
  api-key: your-api-key
  base-url: https://api.moonshot.cn/v1
  model: moonshot-v1-8k

# 文件上传配置
upload:
  path: /Volumes/OtherData/Docker/nginx/html/zhi-mo
  max-size: 10MB

# CORS 配置
cors:
  allowed-origins: http://localhost:10001,http://blog.chqiuu.com:38080

logging:
  level:
    com.chqiuu.zhi-mo: DEBUG
